name: Generate Viral Short

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: viral-short-generator
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      LOG_FILE: run.log

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Validate required secrets
        env:
          # AI Keys (at least one required)
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Required APIs
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GREEN_API_BASE_URL: ${{ secrets.GREEN_API_BASE_URL }}
          GREEN_API_INSTANCE_ID: ${{ secrets.GREEN_API_INSTANCE_ID }}
          GREEN_API_TOKEN: ${{ secrets.GREEN_API_TOKEN }}
          WHATSAPP_CHAT_ID: ${{ secrets.WHATSAPP_CHAT_ID }}
        run: |
          # ===== التحقق من الـ Secrets الإلزامية =====
          missing=()
          for v in PEXELS_API_KEY GREEN_API_BASE_URL \
                   GREEN_API_INSTANCE_ID GREEN_API_TOKEN WHATSAPP_CHAT_ID; do
            if [ -z "${!v}" ]; then
              missing+=("$v")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Missing required secrets: ${missing[*]}"
            exit 1
          fi

          # ===== التحقق من توفّر مفتاح AI واحد على الأقل =====
          ai_keys_count=0
          for v in GEMINI_API_KEY_1 GEMINI_API_KEY_2 GEMINI_API_KEY_3 GEMINI_API_KEY_4 GROQ_API_KEY; do
            if [ -n "${!v}" ]; then
              ai_keys_count=$((ai_keys_count + 1))
              echo "  ✓ $v is set"
            else
              echo "  ⚠️ $v is not set"
            fi
          done

          if [ $ai_keys_count -eq 0 ]; then
            echo "❌ No AI keys configured!"
            echo "Please set at least one of:"
            echo "  - GEMINI_API_KEY_1, GEMINI_API_KEY_2, GEMINI_API_KEY_3, GEMINI_API_KEY_4"
            echo "  - GROQ_API_KEY"
            exit 1
          fi

          echo "✅ All required secrets present + $ai_keys_count AI key(s) configured"

      - name: Verify Excel file exists
        run: |
          if [ ! -f "data/videos.xlsx" ]; then
            echo "❌ Missing required file: data/videos.xlsx"
            echo "Please upload the Excel file with video titles"
            exit 1
          fi
          echo "✅ Excel file found: data/videos.xlsx"
          ls -lh data/videos.xlsx

      - name: Verify Font file exists
        run: |
          FONT_PATH="assets/fonts/NotoNaskhArabic-Bold.ttf"
          if [ ! -f "$FONT_PATH" ]; then
            echo "❌ Missing font file: $FONT_PATH"
            exit 1
          fi
          echo "✅ Font file found: $FONT_PATH"
          ls -lh "$FONT_PATH"

      - name: Verify HTML templates exist
        run: |
          TEMPLATES=("assets/templates/title.html" "assets/templates/read_desc.html")
          missing=()
          for t in "${TEMPLATES[@]}"; do
            if [ ! -f "$t" ]; then
              missing+=("$t")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Missing templates: ${missing[*]}"
            exit 1
          fi
          echo "✅ All HTML templates found"

      - name: Verify Music library exists
        run: |
          MUSIC_DIR="assets/music"
          if [ ! -d "$MUSIC_DIR" ]; then
            echo "❌ Missing music folder: $MUSIC_DIR"
            echo "Please upload .mp3 files to assets/music/"
            exit 1
          fi
          
          mp3_count=$(find "$MUSIC_DIR" -maxdepth 1 -type f -name "*.mp3" | wc -l)
          
          if [ "$mp3_count" -eq 0 ]; then
            echo "❌ No .mp3 files found in $MUSIC_DIR"
            exit 1
          fi
          
          # حساب الحجم الإجمالي
          total_size=$(du -sh "$MUSIC_DIR" | cut -f1)
          
          echo "✅ Music library found: $mp3_count file(s), total size: $total_size"
          echo "📁 First 5 files:"
          ls "$MUSIC_DIR"/*.mp3 | head -n 5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Upgrade pip tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Verify FFmpeg
        run: |
          ffmpeg -version | head -n 1
          ffprobe -version | head -n 1

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip list

      - name: Install Playwright browser (Chromium)
        run: |
          playwright install --with-deps chromium

      - name: Run generator
        id: generator
        continue-on-error: true
        env:
          # ===== AI API Keys =====
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          # ===== Pexels =====
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          # ===== WhatsApp (Green-API) =====
          GREEN_API_BASE_URL: ${{ secrets.GREEN_API_BASE_URL }}
          GREEN_API_INSTANCE_ID: ${{ secrets.GREEN_API_INSTANCE_ID }}
          GREEN_API_TOKEN: ${{ secrets.GREEN_API_TOKEN }}
          WHATSAPP_CHAT_ID: ${{ secrets.WHATSAPP_CHAT_ID }}
          # ===== Python =====
          PYTHONUNBUFFERED: "1"
        run: |
          set -o pipefail
          python main.py 2>&1 | tee "$LOG_FILE"

      - name: Upload generated video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-short
          path: out/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-logs
          path: |
            ${{ env.LOG_FILE }}
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit history, cache, Excel and Music pointers
        if: steps.generator.outcome == 'success'
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -e

          # تحقّق من وجود تغييرات في الملفات المُتتبَّعة
          if [ -z "$(git status --porcelain data/history.json data/pexels_cache.json data/excel_pointer.json data/music_pointer.json 2>/dev/null)" ]; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"

          # أضف الملفات إذا كانت موجودة
          [ -f "data/history.json" ] && git add data/history.json
          [ -f "data/pexels_cache.json" ] && git add data/pexels_cache.json
          [ -f "data/excel_pointer.json" ] && git add data/excel_pointer.json
          [ -f "data/music_pointer.json" ] && git add data/music_pointer.json

          git commit -m "chore: update history, cache, excel and music pointers [skip ci]"

          for attempt in 1 2 3; do
            echo "Push attempt $attempt..."
            git fetch origin "${GITHUB_REF_NAME}"
            if git rebase "origin/${GITHUB_REF_NAME}"; then
              if git push origin "HEAD:${GITHUB_REF_NAME}"; then
                echo "✅ Push successful"
                exit 0
              fi
            else
              echo "⚠️ Rebase failed, aborting"
              git rebase --abort || true
            fi
            sleep $((attempt * 3))
          done

          echo "❌ Failed to push after 3 attempts"
          exit 1

      - name: Fail job if generator failed
        if: steps.generator.outcome != 'success'
        run: |
          echo "❌ Generator failed (outcome: ${{ steps.generator.outcome }})"
          exit 1
