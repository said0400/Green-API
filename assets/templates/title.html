<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <style>
    @font-face {
      font-family: 'NotoNaskhArabic';
      src: url(data:font/truetype;charset=utf-8;base64,{{ font_base64 }}) format('truetype');
      font-weight: bold;
      font-style: normal;
      font-display: block;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background: transparent !important;
      font-family: 'NotoNaskhArabic', 'Arial', sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
      min-height: 100vh;
    }

    /* الحاوية - تتمدد فقط بقدر المحتوى */
    .bubble-container {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      direction: rtl;
    }

    /* الفقاعة */
    .bubble {
      background: #FF1A1A;
      border-radius: 14px;
      padding: 14px 26px;
      max-width: {{ max_width }}px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* الذيل - مستطيل صغير مباشرة تحت الفقاعة */
    .tail {
      width: 42px;
      height: 14px;
      background: #FF1A1A;
      border-radius: 0 0 8px 8px;
      margin-top: -1px; /* لإلصاقه بالفقاعة */
    }

    /* النص */
    .bubble-text {
      font-family: 'NotoNaskhArabic', 'Arial', sans-serif;
      font-size: {{ font_size }}px;
      font-weight: bold;
      color: #FFFFFF;
      text-align: center;
      line-height: 1.5;
      direction: rtl;
      unicode-bidi: plaintext;
    }
  </style>
</head>
<body>
  <div class="bubble-container" id="content">
    <div class="bubble">
      <span class="bubble-text">{{ text }}</span>
    </div>
    <div class="tail"></div>
  </div>
</body>
</html>
