<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <style>
    @font-face {
      font-family: 'NotoNaskhArabic';
      src: url(data:font/truetype;charset=utf-8;base64,{{ font_base64 }}) format('truetype');
      font-weight: bold;
      font-style: normal;
      font-display: block;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background: transparent !important;
      font-family: 'NotoNaskhArabic', 'Arial', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px 40px;
      min-height: 100vh;
    }

    /* الحاوية الرئيسية */
    .title-wrapper {
      position: relative;
      display: inline-block;
      direction: rtl;
    }

    /* الفقاعة الرئيسية */
    .title-box {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #FF1A1A;
      border-radius: 20px;
      padding: 28px 50px;
      max-width: {{ max_width }}px;
      box-shadow:
        0 8px 24px rgba(0, 0, 0, 0.35),
        0 4px 8px rgba(0, 0, 0, 0.2);
      z-index: 2;
    }

    /* الذيل/البروز السفلي (Bubble Tail) */
    .title-box::after {
      content: '';
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-top: 24px solid #FF1A1A;
      filter: drop-shadow(0 4px 4px rgba(0, 0, 0, 0.25));
      z-index: 1;
    }

    /* النص داخل الفقاعة */
    .title-text {
      font-family: 'NotoNaskhArabic', 'Arial', sans-serif;
      font-size: {{ font_size }}px;
      font-weight: bold;
      color: #FFFFFF;
      text-align: center;
      line-height: 1.55;
      letter-spacing: 0px;
      direction: rtl;
      unicode-bidi: plaintext;
      -webkit-text-stroke: 0;
      text-shadow: none;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="title-wrapper" id="content">
    <div class="title-box">
      <span class="title-text">{{ text }}</span>
    </div>
  </div>
</body>
</html>
