<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <style>
    @font-face {
      font-family: 'NotoNaskhArabic';
      src: url(data:font/truetype;charset=utf-8;base64,{{ font_base64 }}) format('truetype');
      font-weight: bold;
      font-style: normal;
      font-display: block;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      /* تعديل: جعل الخلفية بيضاء نقية تماماً مثل الصورة بدلاً من الشفافة */
      background: #FFFFFF !important;
      font-family: 'NotoNaskhArabic', 'Arial', sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      height: 100vh;
      width: 100vw;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* الحاوية الرئيسية المحاكية لمقاس الصورة */
    .title-wrapper {
      width: {{ max_width }}px;
      max-width: {{ max_width }}px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      direction: rtl;
    }

    /* تعديل جذري: تحويل الحاوية إلى كتلة مستطيلة متناسقة */
    .title-box {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      
      /* اللون الأحمر الفاقع الصافي بدون ظلال سوداء */
      background-color: #FF0A0A; 
      
      /* زوايا دائرية ناعمة تطابق تماماً زوايا الصورة */
      border-radius: 28px; 
      
      /* حواف داخلية متوازنة تمنح النص مساحة مريحة يميناً ويساراً وأعلى وأسفل */
      padding: 25px 45px; 
      
      /* عرض أقصى متناسب لضمان نزول النص لسطرين بشكل جمالي */
      max-width: 90%; 
      box-shadow: none; /* إزالة الظلال الخارجية للصندوق */
    }

    /* تنسيق النص الداخلي */
    .title-text {
      font-family: 'NotoNaskhArabic', 'Arial', sans-serif;
      font-size: {{ font_size }}px;
      font-weight: bold;
      color: #FFFFFF; /* لون النص أبيض ناصع */
      
      /* مسافة مريحة بين الأسطر لجعل النص يبدو متناسقاً وعميقاً داخل المستطيل */
      line-height: 1.5; 
      letter-spacing: 0px;
      direction: rtl;
      unicode-bidi: plaintext;
      
      /* إزالة كل الـ Stroke والظلال السوداء التي كانت تعيق مطابقة الصورة الأصلية */
      -webkit-text-stroke: 0px transparent;
      text-shadow: none;
    }
  </style>
</head>
<body>
  <div class="title-wrapper" id="content">
    <div class="title-box">
      <span class="title-text">{{ text }}</span>
    </div>
  </div>
</body>
</html>
