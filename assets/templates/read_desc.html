<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <style>
    @font-face {
      font-family: 'NotoNaskhArabic';
      src: url(data:font/truetype;charset=utf-8;base64,{{ font_base64 }}) format('truetype');
      font-weight: bold;
      font-style: normal;
      font-display: block;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background: transparent !important;
      font-family: 'NotoNaskhArabic', 'Noto Naskh Arabic', 'Arial', sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
      min-height: 100vh;
    }

    .read-box {
      background: #FF5F5F;
      color: #FFFFFF;
      font-family: 'NotoNaskhArabic', 'Noto Naskh Arabic', 'Arial', sans-serif;
      padding: 22px 44px;
      border-radius: 32px;
      font-size: {{ font_size }}px;
      font-weight: 900;
      text-align: center;
      line-height: 1.4;
      box-shadow:
        0 8px 24px rgba(0, 0, 0, 0.35),
        0 3px 10px rgba(255, 95, 95, 0.4);
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.25);
      direction: rtl;
      unicode-bidi: plaintext;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .arrow {
      display: inline-block;
      font-size: {{ font_size }}px;
      animation: bounce 1.2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
  </style>
</head>
<body>
  <div class="read-box" id="content">
    <span>{{ text }}</span>
    <span class="arrow">👇</span>
  </div>
</body>
</html>
